<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart2Data — 图表曲线数字化提取工具</title>
    <meta name="description" content="将科研图表中的曲线自动提取为 (X,Y) 数值数据，支持手动取点与半自动颜色拾取，导出 Excel。">
    <script async src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(18, 22, 30, 0.72);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            --card-bg: rgba(28, 34, 48, 0.55);
            --card-border: rgba(255, 255, 255, 0.06);
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-dim: rgba(88, 166, 255, 0.15);
            --success: #3fb950;
            --success-dim: rgba(63, 185, 80, 0.12);
            --warning: #d29922;
            --warning-dim: rgba(210, 153, 34, 0.12);
            --danger: #f85149;
            --danger-dim: rgba(248, 81, 73, 0.12);
            --purple: #a371f7;
            --radius: 10px;
            --radius-sm: 6px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --mono: 'Consolas', 'Cascadia Code', 'JetBrains Mono', monospace;
            --blur: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ========== Prism WebGL 背景层 ========== */
        #prismCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body {
            font-family: var(--font);
            background: #0a0d13;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 主内容层叠在 Prism 之上 */
        .header, .main, .modal-overlay, .toast {
            position: relative;
            z-index: 1;
        }

        /* ========== 顶部导航栏 ========== */
        .header {
            background: rgba(14, 18, 26, 0.78);
            backdrop-filter: blur(var(--blur)) saturate(1.3);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(1.3);
            border-bottom: 1px solid var(--glass-border);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        .header .logo span { color: var(--text-secondary); font-weight: 400; font-size: 13px; margin-left: 6px; }
        .header .status-badge {
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 14px;
            font-weight: 600;
            letter-spacing: 0.4px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .status-idle     { background: rgba(48, 54, 61, 0.5); color: var(--text-secondary); }
        .status-loaded   { background: var(--accent-dim); color: var(--accent); }
        .status-calib    { background: var(--warning-dim); color: var(--warning); }
        .status-ready    { background: var(--success-dim); color: var(--success); }
        .status-extract  { background: rgba(163, 113, 247, 0.15); color: var(--purple); }

        /* ========== 主体布局 ========== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========== 左侧面板 ========== */
        .sidebar {
            width: 360px;
            min-width: 360px;
            background: rgba(18, 22, 30, 0.62);
            backdrop-filter: blur(var(--blur)) saturate(1.2);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(1.2);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            gap: 12px;
            z-index: 2;
        }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .section:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.3);
        }
        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.5);
        }
        .section-title .dot.warn { background: var(--warning); box-shadow: 0 0 8px rgba(210, 153, 34, 0.5); }
        .section-title .dot.ok   { background: var(--success); box-shadow: 0 0 8px rgba(63, 185, 80, 0.5); }
        .section-title .dot.purple { background: var(--purple); box-shadow: 0 0 8px rgba(163, 113, 247, 0.5); }

        /* 上传区域 */
        .upload-zone {
            display: block;
            border: 2px dashed rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.02);
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.1);
        }
        .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
        .upload-zone .hint  { font-size: 12px; margin-top: 4px; }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 13px;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .btn:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        .btn-primary:hover { background: #4090e0; box-shadow: 0 4px 16px rgba(88, 166, 255, 0.35); }
        .btn-success { background: var(--success); border-color: var(--success); color: #fff; font-weight: 600; }
        .btn-success:hover { background: #2ea043; box-shadow: 0 4px 16px rgba(63, 185, 80, 0.35); }
        .btn-danger  { background: var(--danger-dim); border-color: rgba(248, 81, 73, 0.3); color: var(--danger); }
        .btn-danger:hover  { background: var(--danger); color: #fff; border-color: var(--danger); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

        /* 标定点卡片 */
        .calib-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .calib-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 10px;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        .calib-item .label {
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .calib-item .value {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
        }
        .calib-item.filled { border-color: var(--accent); background: var(--accent-dim); }
        .calib-item.filled .value { color: var(--accent); }

        /* 滑块+输入组合 */
        .param-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .param-row label {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 70px;
        }
        .param-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            height: 4px;
        }
        .param-row .val-display {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            min-width: 36px;
            text-align: right;
        }

        .color-preview {
            display: inline-block;
            width: 20px; height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        /* 数据预览表格 */
        .data-table-wrap {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px;
        }
        .data-table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-family: var(--mono);
        }
        .data-table-wrap th {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-secondary);
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
        }
        .data-table-wrap td {
            padding: 4px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .data-table-wrap tr:hover td { background: rgba(88, 166, 255, 0.06); }

        /* ========== 右侧画布区域 ========== */
        .canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            overflow: hidden;
            z-index: 2;
        }
        .canvas-container {
            position: relative;
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: box-shadow 0.4s ease;
        }
        .canvas-container canvas {
            display: block;
            border-radius: 3px;
        }
        #overlayCanvas {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }
        #overlayCanvas.interactive {
            pointer-events: auto;
        }
        .canvas-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-secondary);
            padding: 6px 16px;
            border-radius: 14px;
            font-size: 12px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #selectionBox {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border: 2px dashed #f85149;
            background: rgba(248, 81, 73, 0.12);
            pointer-events: none;
            z-index: 5;
            border-radius: 2px;
        }
        #magnifierCanvas {
            display: none;
            position: absolute;
            top: 0; left: 0;
            border: 2px solid #3fb950;
            border-radius: 50%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 5;
            image-rendering: pixelated;
        }
        @keyframes detectFlash {
            0%   { box-shadow: 0 0 0 0 rgba(100, 255, 50, 0.6); }
            100% { box-shadow: 0 0 0 24px rgba(100, 255, 50, 0); }
        }
        .canvas-container.flash {
            animation: detectFlash 0.8s ease-out;
        }

        /* ========== 自定义模态框 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 24px;
            min-width: 340px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .modal-box h3 {
            font-size: 15px;
            margin-bottom: 6px;
        }
        .modal-box .step-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .modal-box input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 16px;
            font-family: var(--mono);
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s ease;
        }
        .modal-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }
        .modal-box .btn-row { justify-content: flex-end; }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(28, 34, 48, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 3px solid var(--accent);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 2000;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }

        /* 响应式 */
        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; min-width: 0; max-height: 40vh; }
        }
    </style>
</head>
<body>

<!-- Prism WebGL 背景 -->
<canvas id="prismCanvas"></canvas>

<!-- ==================== 顶部导航 ==================== -->
<div class="header">
    <div class="logo">Chart2Data <span>| 图转数据</span></div>
    <div style="flex:1"></div>
    <span id="statusBadge" class="status-badge status-idle">待上传图片</span>
</div>

<!-- ==================== 主体 ==================== -->
<div class="main">

    <!-- 左侧控制面板 -->
    <div class="sidebar" id="sidebar">

        <!-- 1. 图片导入 -->
        <div class="section" id="sectionUpload">
            <div class="section-title"><span class="dot"></span> 1. 图片导入</div>
            <label class="upload-zone" id="uploadZone" for="fileInput">
                <div class="icon">&#x1F5BC;</div>
                <div>拖拽图片到此处，或点击上传</div>
                <div class="hint">支持 PNG / JPG / BMP / TIFF / WebP</div>
            </label>
            <input type="file" id="fileInput" accept="image/*" style="position:absolute;left:-9999px;">
            <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);text-align:center;" id="imageInfo"></div>
        </div>

        <!-- 2. 坐标轴标定 -->
        <div class="section" id="sectionCalib">
            <div class="section-title"><span class="dot warn"></span> 2. 坐标轴标定</div>
            <div class="calib-grid">
                <div class="calib-item" id="calibX1">
                    <div class="label">X 轴起点</div>
                    <div class="value">—</div>
                </div>
                <div class="calib-item" id="calibX2">
                    <div class="label">X 轴终点</div>
                    <div class="value">—</div>
                </div>
                <div class="calib-item" id="calibY1">
                    <div class="label">Y 轴起点</div>
                    <div class="value">—</div>
                </div>
                <div class="calib-item" id="calibY2">
                    <div class="label">Y 轴终点</div>
                    <div class="value">—</div>
                </div>
            </div>
            <div class="btn-row" style="margin-top:12px;">
                <button type="button" class="btn btn-primary" id="btnStartCalib" disabled>开始标定</button>
                <button type="button" class="btn btn-sm" id="btnResetCalib" disabled>重置</button>
            </div>
        </div>

        <!-- 3. 数据提取 -->
        <div class="section" id="sectionExtract">
            <div class="section-title"><span class="dot purple"></span> 3. 数据提取</div>

            <div style="margin-bottom:12px;">
                <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">手动取点模式</div>
                <div class="btn-row">
                    <button type="button" class="btn btn-sm" id="btnManualMode" disabled>✏️ 手动选点</button>
                    <button type="button" class="btn btn-sm" id="btnUndoPoint" disabled>↩ 撤销上点</button>
                    <button type="button" class="btn btn-sm btn-danger" id="btnClearManual" disabled>清空</button>
                </div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;" id="manualCount">已采样 0 个点</div>
            </div>

            <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;">
                <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">半自动颜色拾取模式</div>
                <div class="btn-row" style="margin-bottom:8px;">
                    <button type="button" class="btn btn-sm" id="btnSemiAutoMode" disabled>🎯 拾取曲线颜色</button>
                    <button type="button" class="btn btn-sm btn-danger" id="btnBoxDelete" disabled style="display:none;">⬜ 框选删除</button>
                </div>
                <div class="param-row">
                    <label>颜色容差</label>
                    <input type="range" id="toleranceSlider" min="0" max="150" value="40" step="1">
                    <span class="val-display" id="toleranceVal">40</span>
                </div>
                <div style="font-size:10px;color:var(--text-secondary);margin:-4px 0 4px 70px;line-height:1.4;" id="toleranceHint">
                    容差 = RGB颜色空间距离阈值。值越小匹配越严格，值越大纳入更多近似色。
                </div>
                <div class="param-row" style="align-items:center;">
                    <label>目标颜色</label>
                    <span class="color-preview" id="colorPreview" style="background:#888;"></span>
                    <span style="font-size:11px;color:var(--text-secondary);" id="colorText">未采样</span>
                </div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;" id="semiAutoCount">检测到 0 个像素</div>
                <div class="btn-row" style="margin-top:8px;">
                    <button type="button" class="btn btn-sm btn-primary" id="btnConfirmSemiAuto" disabled>确认提取</button>
                </div>
            </div>
        </div>

        <!-- 4. 数据处理 -->
        <div class="section" id="sectionProcess">
            <div class="section-title"><span class="dot"></span> 4. 数据处理与导出</div>
            <div class="param-row">
                <label>输出数据组数</label>
                <input type="range" id="resampleSlider" min="10" max="4000" value="500" step="10">
                <span class="val-display" id="resampleVal">500</span>
            </div>
            <div class="param-row">
                <label>精确数量</label>
                <input type="number" id="resampleInput" value="500" min="10" max="4000" step="10"
                    style="width:80px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);color:var(--text);
                    padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:13px;">
            </div>
            <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;" id="dataStats">
                当前原始数据: 0 组 | 处理后: 0 组
            </div>

            <div class="data-table-wrap" id="tableWrap" style="display:none;">
                <table>
                    <thead><tr><th>序号</th><th>X</th><th>Y</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;text-align:center;" id="tableHint"></div>

            <div class="btn-row" style="margin-top:12px;">
                <button type="button" class="btn btn-success" id="btnExport" disabled>📥 导出 Excel (.xlsx)</button>
                <button type="button" class="btn btn-sm btn-danger" id="btnClearAll" disabled>清空所有数据</button>
            </div>
        </div>
    </div>

    <!-- 右侧画布 -->
    <div class="canvas-area" id="canvasArea">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="imageCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
            <div id="selectionBox"></div>
            <canvas id="magnifierCanvas" width="140" height="140"></canvas>
        </div>
        <div class="canvas-hint" id="canvasHint">请先上传一张科研图表</div>
    </div>
</div>

<!-- ==================== 标定输入模态框 ==================== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3 id="modalTitle">标定输入</h3>
        <div class="step-hint" id="modalHint"></div>
        <input type="number" id="modalInput" placeholder="请输入实际坐标值" step="any">
        <div class="btn-row">
            <button type="button" class="btn btn-sm" id="modalCancel">取消</button>
            <button type="button" class="btn btn-sm btn-primary" id="modalConfirm">确认</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/**
 * ============================================================
 *  Prism WebGL 背景 — 交互式 3D 棱镜着色器
 *  鼠标 hover 控制旋转，毛玻璃 UI 层叠其上
 * ============================================================
 */
(function() {
    var canvas = document.getElementById('prismCanvas');
    var gl = canvas.getContext('webgl', { alpha: true, antialias: false })
          || canvas.getContext('experimental-webgl', { alpha: true, antialias: false });
    if (!gl) { canvas.style.display = 'none'; return; }

    gl.disable(gl.DEPTH_TEST);
    gl.disable(gl.CULL_FACE);
    gl.disable(gl.BLEND);

    // ── Shaders ──────────────────────────────────────────
    var vertexSrc = [
        'attribute vec2 aPos;',
        'void main() { gl_Position = vec4(aPos, 0.0, 1.0); }'
    ].join('\n');

    var fragmentSrc = [
        'precision highp float;',
        'uniform vec2  iResolution;',
        'uniform float iTime;',
        'uniform float uHeight;',
        'uniform float uBaseHalf;',
        'uniform mat3  uRot;',
        'uniform float uGlow;',
        'uniform vec2  uOffsetPx;',
        'uniform float uNoise;',
        'uniform float uSaturation;',
        'uniform float uScale;',
        'uniform float uHueShift;',
        'uniform float uColorFreq;',
        'uniform float uBloom;',
        'uniform float uCenterShift;',
        'uniform float uInvBaseHalf;',
        'uniform float uInvHeight;',
        'uniform float uMinAxis;',
        'uniform float uPxScale;',
        'uniform float uTimeScale;',

        'vec4 tanh4(vec4 x){',
        '  vec4 e2x = exp(2.0*x);',
        '  return (e2x - 1.0) / (e2x + 1.0);',
        '}',

        'float rand(vec2 co){',
        '  return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453123);',
        '}',

        'float sdPyramidUpInv(vec3 p){',
        '  vec3 q = vec3(abs(p.x) * uInvBaseHalf, abs(p.y) * uInvHeight, abs(p.z) * uInvBaseHalf);',
        '  float m = q.x + q.y + q.z - 1.0;',
        '  float oct = m * uMinAxis * 0.5773502691896258;',
        '  return max(oct, -p.y);',
        '}',

        'mat3 hueRotation(float a){',
        '  float c = cos(a), s = sin(a);',
        '  mat3 W = mat3(0.299, 0.587, 0.114, 0.299, 0.587, 0.114, 0.299, 0.587, 0.114);',
        '  mat3 U = mat3(0.701, -0.587, -0.114, -0.299, 0.413, -0.114, -0.300, -0.588, 0.886);',
        '  mat3 V = mat3(0.168, -0.331, 0.500, 0.328, 0.035, -0.500, -0.497, 0.296, 0.201);',
        '  return W + U * c + V * s;',
        '}',

        'void main(){',
        '  vec2 f = (gl_FragCoord.xy - 0.5 * iResolution.xy - uOffsetPx) * uPxScale;',
        '  float z = 5.0;',
        '  vec4 o = vec4(0.0);',
        '  float centerShift = uCenterShift;',
        '  float cf = uColorFreq;',
        '  vec3 p;',

        '  for (int i = 0; i < 80; i++) {',
        '    p = vec3(f, z);',
        '    p = uRot * p;',
        '    vec3 q = p;',
        '    q.y += centerShift;',
        '    float d = 0.1 + 0.2 * abs(sdPyramidUpInv(q));',
        '    z -= d;',
        '    o += (sin((p.y + z) * cf + vec4(0.0, 1.0, 2.0, 3.0)) + 1.0) / d;',
        '  }',

        '  o = tanh4(o * o * (uGlow * uBloom) / 1e5);',
        '  vec3 col = o.rgb;',
        '  float n = rand(gl_FragCoord.xy + vec2(iTime));',
        '  col += (n - 0.5) * uNoise;',
        '  col = clamp(col, 0.0, 1.0);',
        '  float L = dot(col, vec3(0.2126, 0.7152, 0.0722));',
        '  col = clamp(mix(vec3(L), col, uSaturation), 0.0, 1.0);',
        '  if(abs(uHueShift) > 0.0001){ col = clamp(hueRotation(uHueShift) * col, 0.0, 1.0); }',
        '  gl_FragColor = vec4(col, o.a);',
        '}'
    ].join('\n');

    // ── Compile shader ───────────────────────────────────
    function makeShader(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
            console.warn('[Prism] shader error:', gl.getShaderInfoLog(s));
        }
        return s;
    }
    var vs = makeShader(gl.VERTEX_SHADER, vertexSrc);
    var fs = makeShader(gl.FRAGMENT_SHADER, fragmentSrc);
    var prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    gl.useProgram(prog);

    // ── Fullscreen triangle ──────────────────────────────
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    var aPos = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    // ── Uniform locations ────────────────────────────────
    var UL = {};
    ['iResolution','iTime','uHeight','uBaseHalf','uRot','uGlow','uOffsetPx',
     'uNoise','uSaturation','uScale','uHueShift','uColorFreq','uBloom',
     'uCenterShift','uInvBaseHalf','uInvHeight','uMinAxis','uPxScale','uTimeScale'
    ].forEach(function(n){ UL[n] = gl.getUniformLocation(prog, n); });

    // ── Parameters ───────────────────────────────────────
    var H = 3.0;
    var BW = 5.0;
    var BASE_HALF = BW * 0.5;
    var GLOW = 0.7;
    var NOISE = 0.12;
    var SAT = 1.4;
    var SCALE = 2.8;
    var HUE = 0.0;
    var CFREQ = 0.7;
    var BLOOM = 0.7;
    var TS = 0.5;
    var HOVSTR = 1.8;
    var INERT = 0.06;

    gl.uniform1f(UL.uHeight, H);
    gl.uniform1f(UL.uBaseHalf, BASE_HALF);
    gl.uniform1f(UL.uGlow, GLOW);
    gl.uniform1f(UL.uNoise, NOISE);
    gl.uniform1f(UL.uSaturation, SAT);
    gl.uniform1f(UL.uScale, SCALE);
    gl.uniform1f(UL.uHueShift, HUE);
    gl.uniform1f(UL.uColorFreq, CFREQ);
    gl.uniform1f(UL.uBloom, BLOOM);
    gl.uniform1f(UL.uCenterShift, H * 0.25);
    gl.uniform1f(UL.uInvBaseHalf, 1 / BASE_HALF);
    gl.uniform1f(UL.uInvHeight, 1 / H);
    gl.uniform1f(UL.uMinAxis, Math.min(BASE_HALF, H));
    gl.uniform1f(UL.uTimeScale, TS);

    var rotBuf = new Float32Array([1,0,0, 0,1,0, 0,0,1]);

    function setMat3FromEuler(yawY, pitchX, rollZ, out) {
        var cy = Math.cos(yawY), sy = Math.sin(yawY);
        var cx = Math.cos(pitchX), sx = Math.sin(pitchX);
        var cz = Math.cos(rollZ), sz = Math.sin(rollZ);
        out[0] = cy * cz + sy * sx * sz;
        out[1] = cx * sz;
        out[2] = -sy * cz + cy * sx * sz;
        out[3] = -cy * sz + sy * sx * cz;
        out[4] = cx * cz;
        out[5] = sy * sz + cy * sx * cz;
        out[6] = sy * cx;
        out[7] = -sx;
        out[8] = cy * cx;
        return out;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    // ── Mouse tracking ───────────────────────────────────
    var pointer = { x: 0, y: 0, inside: false };
    var yaw = 0, pitch = 0, roll = 0;
    var targetYaw = 0, targetPitch = 0;

    window.addEventListener('pointermove', function(e) {
        var ww = Math.max(1, window.innerWidth);
        var wh = Math.max(1, window.innerHeight);
        pointer.x = Math.max(-1, Math.min(1, (e.clientX - ww * 0.5) / (ww * 0.5)));
        pointer.y = Math.max(-1, Math.min(1, (e.clientY - wh * 0.5) / (wh * 0.5)));
        pointer.inside = true;
    }, { passive: true });
    window.addEventListener('mouseleave', function(){ pointer.inside = false; });
    window.addEventListener('blur', function(){ pointer.inside = false; });

    // ── Resize ───────────────────────────────────────────
    function resize() {
        var dpr = Math.min(2, window.devicePixelRatio || 1);
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.uniform2f(UL.iResolution, canvas.width, canvas.height);
        gl.uniform2f(UL.uOffsetPx, 0, 0);
        gl.uniform1f(UL.uPxScale, 1 / (Math.max(1, canvas.height) * 0.1 * SCALE));
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Render loop ──────────────────────────────────────
    var t0 = performance.now();
    function render(t) {
        var time = (t - t0) * 0.001;
        gl.uniform1f(UL.iTime, time);

        var maxAngle = 0.6 * HOVSTR;
        targetYaw = (pointer.inside ? -pointer.x : 0) * maxAngle;
        targetPitch = (pointer.inside ? pointer.y : 0) * maxAngle;
        yaw = lerp(yaw, targetYaw, INERT);
        pitch = lerp(pitch, targetPitch, INERT);
        roll = lerp(roll, 0, 0.1);

        setMat3FromEuler(yaw, pitch, roll, rotBuf);
        gl.uniformMatrix3fv(UL.uRot, false, rotBuf);

        gl.drawArrays(gl.TRIANGLES, 0, 3);
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
})();
</script>

<script>
/**
 * ============================================================
 *  Chart Digitizer — 科研图表数字化工具
 *  将图片中的曲线数据提取为 (X, Y) 坐标，支持导出 Excel
 * ============================================================
 */
(function() {
    // ==================== DOM 引用缓存 ====================
    var $ = function(sel) { return document.querySelector(sel); };

    var dom = {
        statusBadge:    $('#statusBadge'),
        uploadZone:     $('#uploadZone'),
        fileInput:      $('#fileInput'),
        imageInfo:      $('#imageInfo'),
        imageCanvas:    $('#imageCanvas'),
        overlayCanvas:  $('#overlayCanvas'),
        canvasContainer:$('#canvasContainer'),
        canvasArea:     $('#canvasArea'),
        canvasHint:     $('#canvasHint'),
        selectionBox:   $('#selectionBox'),
        magnifierCanvas:$('#magnifierCanvas'),
        btnStartCalib:  $('#btnStartCalib'),
        btnResetCalib:  $('#btnResetCalib'),
        calibX1:        $('#calibX1'),
        calibX2:        $('#calibX2'),
        calibY1:        $('#calibY1'),
        calibY2:        $('#calibY2'),
        btnManualMode:  $('#btnManualMode'),
        btnUndoPoint:   $('#btnUndoPoint'),
        btnClearManual: $('#btnClearManual'),
        manualCount:    $('#manualCount'),
        btnSemiAutoMode:$('#btnSemiAutoMode'),
        toleranceSlider:$('#toleranceSlider'),
        toleranceVal:   $('#toleranceVal'),
        colorPreview:   $('#colorPreview'),
        colorText:      $('#colorText'),
        semiAutoCount:  $('#semiAutoCount'),
        btnConfirmSemiAuto: $('#btnConfirmSemiAuto'),
        btnBoxDelete:   $('#btnBoxDelete'),
        resampleSlider: $('#resampleSlider'),
        resampleVal:    $('#resampleVal'),
        resampleInput:  $('#resampleInput'),
        dataStats:      $('#dataStats'),
        tableWrap:      $('#tableWrap'),
        tableBody:      $('#tableBody'),
        tableHint:      $('#tableHint'),
        btnExport:      $('#btnExport'),
        btnClearAll:    $('#btnClearAll'),
        modalOverlay:   $('#modalOverlay'),
        modalTitle:     $('#modalTitle'),
        modalHint:      $('#modalHint'),
        modalInput:     $('#modalInput'),
        modalCancel:    $('#modalCancel'),
        modalConfirm:   $('#modalConfirm'),
        toast:          $('#toast'),
    };

    // ==================== 应用状态 ====================
    var STATE = {
        IDLE:            'idle',
        IMAGE_LOADED:    'image_loaded',
        CALIBRATING:     'calibrating',
        CALIBRATED:      'calibrated',
        EXTRACTING_MANUAL:'extracting_manual',
        EXTRACTING_SEMI: 'extracting_semi',
        BOX_DELETE:      'box_delete',
    };

    var state = {
        current: STATE.IDLE,
        image: null,
        imgNaturalW: 0,
        imgNaturalH: 0,
        canvasW: 0,
        canvasH: 0,
        scale: 1,
        calibStep: 0,
        calib: {
            x1: { px: 0, py: 0, real: 0, label: 'X轴起点' },
            x2: { px: 0, py: 0, real: 0, label: 'X轴终点' },
            y1: { px: 0, py: 0, real: 0, label: 'Y轴起点' },
            y2: { px: 0, py: 0, real: 0, label: 'Y轴终点' },
        },
        manualPoints: [],
        manualRealPoints: [],
        semiAutoRealPoints: [],
        semiAutoPixels: [],
        targetColor: null,
        processedData: [],
        modalCallback: null,
        boxSelect: { active: false, startX: 0, startY: 0, endX: 0, endY: 0 },
        overlaySnapshot: null,
    };

    // ==================== 工具函数 ====================

    var toastTimer = null;
    function showToast(msg, type) {
        type = type || '';
        var t = dom.toast;
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { t.className = 'toast'; }, 2500);
    }

    function setStatus(text, cssClass) {
        dom.statusBadge.textContent = text;
        dom.statusBadge.className = 'status-badge ' + cssClass;
    }

    function setCanvasHint(text) {
        dom.canvasHint.textContent = text;
    }

    function refreshUI() {
        var s = state.current;

        dom.btnStartCalib.disabled  = (s === STATE.IDLE || s === STATE.CALIBRATING);
        dom.btnResetCalib.disabled  = (state.calibStep === 0 && s !== STATE.CALIBRATED);

        dom.btnManualMode.disabled  = (s === STATE.IDLE || s === STATE.IMAGE_LOADED || s === STATE.CALIBRATING);
        dom.btnUndoPoint.disabled   = (state.manualPoints.length === 0);
        dom.btnClearManual.disabled = (state.manualPoints.length === 0);

        dom.btnSemiAutoMode.disabled = (s === STATE.IDLE || s === STATE.IMAGE_LOADED || s === STATE.CALIBRATING);
        dom.btnConfirmSemiAuto.disabled = (state.semiAutoPixels.length === 0);

        dom.btnExport.disabled   = (state.processedData.length === 0);
        dom.btnClearAll.disabled = (getAllRealPoints().length === 0 && state.manualPoints.length === 0);

        var interactive = (s === STATE.CALIBRATING || s === STATE.EXTRACTING_MANUAL
                      || s === STATE.EXTRACTING_SEMI || s === STATE.BOX_DELETE);
        dom.overlayCanvas.className = interactive ? 'interactive' : '';

        var hasSemiPixels = state.semiAutoPixels.length > 0;
        var inSemiOrBox = (s === STATE.EXTRACTING_SEMI || s === STATE.BOX_DELETE);
        dom.btnBoxDelete.style.display = (hasSemiPixels && inSemiOrBox) ? '' : 'none';
        dom.btnBoxDelete.disabled  = !hasSemiPixels;
        if (s === STATE.BOX_DELETE) {
            dom.btnBoxDelete.textContent = '⬜ 框选中…（拖拽选区后自动退出）';
            dom.btnBoxDelete.style.background = 'var(--danger)';
            dom.btnBoxDelete.style.color = '#fff';
        } else {
            dom.btnBoxDelete.textContent = '⬜ 框选删除';
            dom.btnBoxDelete.style.background = '';
            dom.btnBoxDelete.style.color = '';
        }
    }

    function getAllRealPoints() {
        return state.manualRealPoints.concat(state.semiAutoRealPoints);
    }
    function pixelToReal(px, py) {
        var c = state.calib;
        var xReal = c.x1.real + (px - c.x1.px) * (c.x2.real - c.x1.real) / (c.x2.px - c.x1.px);
        var yReal = c.y1.real + (py - c.y1.py) * (c.y2.real - c.y1.real) / (c.y2.py - c.y1.py);
        return { x: xReal, y: yReal };
    }

    function colorDistance(r1, g1, b1, r2, g2, b2) {
        var dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
        return Math.sqrt(dr * dr + dg * dg + db * db);
    }

    // ==================== Canvas 绘制 ====================

    function drawImageOnCanvas() {
        if (!state.image) return;
        if (state.canvasW <= 0 || state.canvasH <= 0) {
            console.error('[Digitizer] 无效的画布尺寸:', state.canvasW, 'x', state.canvasH);
            return;
        }
        try {
            var canvas = dom.imageCanvas;
            var ctx = canvas.getContext('2d');
            canvas.width  = state.canvasW;
            canvas.height = state.canvasH;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(state.image, 0, 0, state.canvasW, state.canvasH);

            dom.overlayCanvas.width  = state.canvasW;
            dom.overlayCanvas.height = state.canvasH;
            dom.overlayCanvas.style.width  = state.canvasW + 'px';
            dom.overlayCanvas.style.height = state.canvasH + 'px';
            dom.imageCanvas.style.width  = state.canvasW + 'px';
            dom.imageCanvas.style.height = state.canvasH + 'px';
        } catch (err) {
            console.error('[Digitizer] drawImageOnCanvas 异常:', err);
        }
    }

    function drawOverlay() {
        var canvas = dom.overlayCanvas;
        if (canvas.width === 0) return;
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        var calibDefs = [
            { d: state.calib.x1, color: '#f85149', label: 'X1' },
            { d: state.calib.x2, color: '#f0883e', label: 'X2' },
            { d: state.calib.y1, color: '#58a6ff', label: 'Y1' },
            { d: state.calib.y2, color: '#a371f7', label: 'Y2' },
        ];

        calibDefs.forEach(function(def) {
            var d = def.d, color = def.color, label = def.label;
            if (d.px === 0 && d.py === 0) return;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            ctx.moveTo(d.px - 16, d.py); ctx.lineTo(d.px + 16, d.py);
            ctx.moveTo(d.px, d.py - 16); ctx.lineTo(d.px, d.py + 16);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(d.px, d.py, 8, 0, Math.PI * 2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(d.px, d.py, 3, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.font = 'bold 11px Consolas, monospace';
            ctx.fillStyle = color;
            ctx.fillText(label + '=' + d.real, d.px + 14, d.py - 8);
        });

        state.manualPoints.forEach(function(pt, i) {
            ctx.beginPath();
            ctx.arc(pt.px, pt.py, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#3fb950';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.font = '9px Consolas, monospace';
            ctx.fillStyle = '#fff';
            ctx.fillText(i + 1, pt.px + 8, pt.py - 6);
        });

        if (state.semiAutoPixels.length > 0 && state.semiAutoPixels.length < 50000) {
            var pts = state.semiAutoPixels;
            var step = pts.length > 30000 ? Math.ceil(pts.length / 30000) : 1;
            var imgData = ctx.createImageData(canvas.width, canvas.height);
            for (var i = 0; i < imgData.data.length; i += 4) {
                imgData.data[i + 3] = 0;
            }
            for (var i = 0; i < pts.length; i += step) {
                var px = pts[i].px, py = pts[i].py;
                var idx = (Math.round(py) * canvas.width + Math.round(px)) * 4;
                if (idx >= 0 && idx < imgData.data.length - 3) {
                    imgData.data[idx]     = 100;
                    imgData.data[idx + 1] = 255;
                    imgData.data[idx + 2] = 50;
                    imgData.data[idx + 3] = 240;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        } else if (state.semiAutoPixels.length >= 50000) {
            ctx.font = '12px Consolas, monospace';
            ctx.fillStyle = '#ff0';
            ctx.fillText('检测像素过多 (' + state.semiAutoPixels.length + ')，请提高容差精度', 20, 30);
        }
    }

    // ==================== 图片导入 ====================

    function loadImageFile(file) {
        if (!file) {
            showToast('请选择有效的图片文件', 'error');
            return;
        }
        if (file.type && !file.type.startsWith('image/')) {
            showToast('请选择有效的图片文件（不支持 ' + file.type + '）', 'error');
            return;
        }
        console.log('[Digitizer] 加载文件:', file.name, file.type, file.size, 'bytes');
        dom.imageInfo.textContent = '正在读取文件...';
        dom.imageInfo.style.color = 'var(--warning)';

        var reader = new FileReader();
        reader.onerror = function(err) {
            console.error('[Digitizer] FileReader 错误:', err);
            showToast('文件读取失败，请重试', 'error');
            dom.imageInfo.textContent = '读取失败';
            dom.imageInfo.style.color = 'var(--danger)';
        };
        reader.onload = function(e) {
            var dataURL = e.target.result;
            console.log('[Digitizer] FileReader 完成, dataURL长度:', dataURL ? dataURL.length : 0);

            if (dataURL && dataURL.length > 50 * 1024 * 1024) {
                console.warn('[Digitizer] 图片文件较大 (' + (dataURL.length / 1024 / 1024).toFixed(1) + 'MB)，加载可能较慢');
            }
            if (!dataURL || !dataURL.startsWith('data:image/')) {
                console.error('[Digitizer] 无效的数据URL:', dataURL ? dataURL.substring(0, 50) : 'null');
                showToast('文件格式不支持', 'error');
                dom.imageInfo.textContent = '文件格式不支持';
                dom.imageInfo.style.color = 'var(--danger)';
                setStatus('加载失败', 'status-idle');
                return;
            }

            dom.imageInfo.textContent = '正在解析图片...';
            var img = new Image();
            var imgLoaded = false;

            var watchdog = setTimeout(function() {
                if (!imgLoaded) {
                    console.error('[Digitizer] Image 加载超时 (30s)');
                    dom.imageInfo.textContent = '图片加载超时 — 文件可能过大或格式不受支持';
                    dom.imageInfo.style.color = 'var(--danger)';
                    setStatus('加载超时', 'status-idle');
                }
            }, 30000);

            function markLoaded() {
                imgLoaded = true;
                clearTimeout(watchdog);
            }

            img.onabort = function() {
                markLoaded();
                console.warn('[Digitizer] Image 加载被取消');
                dom.imageInfo.textContent = '加载已取消';
                dom.imageInfo.style.color = 'var(--danger)';
            };

            img.onerror = function(err) {
                markLoaded();
                console.error('[Digitizer] Image 解析错误, 不支持的格式或损坏的文件');
                showToast('图片解析失败，请确认文件格式正确（浏览器可能不支持TIFF等格式）', 'error');
                dom.imageInfo.textContent = '图片解析失败 — 文件可能已损坏或格式不受支持';
                dom.imageInfo.style.color = 'var(--danger)';
                setStatus('加载失败', 'status-idle');
            };

            img.onload = function() {
                markLoaded();
                try {
                    console.log('[Digitizer] Image 加载成功:', img.naturalWidth, 'x', img.naturalHeight);
                    state.image = img;
                    state.imgNaturalW = img.naturalWidth;
                    state.imgNaturalH = img.naturalHeight;

                    var area = dom.canvasArea;
                    var maxW = Math.max(area.clientWidth - 40, 100);
                    var maxH = Math.max(area.clientHeight - 40, 100);
                    var scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1.0);
                    console.log('[Digitizer] 缩放计算: maxW=' + maxW + ' maxH=' + maxH + ' scale=' + scale.toFixed(4));
                    state.scale = scale;
                    state.canvasW = Math.max(Math.round(img.naturalWidth * scale), 1);
                    state.canvasH = Math.max(Math.round(img.naturalHeight * scale), 1);

                    drawImageOnCanvas();

                    resetCalibration();
                    resetAllData();

                    state.current = STATE.IMAGE_LOADED;
                    setStatus('图片已加载', 'status-loaded');
                    setCanvasHint('请点击"开始标定"建立坐标参考系');
                    dom.imageInfo.style.color = '';
                    dom.imageInfo.textContent =
                        '原图 ' + img.naturalWidth + '×' + img.naturalHeight +
                        ' | 显示 ' + state.canvasW + '×' + state.canvasH;
                    console.log('[Digitizer] 图片加载成功，显示尺寸:', state.canvasW, 'x', state.canvasH);
                    refreshUI();
                    drawOverlay();
                } catch (err) {
                    console.error('[Digitizer] img.onload 内部异常:', err);
                    dom.imageInfo.textContent = '渲染失败: ' + err.message;
                    dom.imageInfo.style.color = 'var(--danger)';
                    setStatus('渲染失败', 'status-idle');
                }
            };

            img.src = dataURL;
        };
        reader.readAsDataURL(file);
    }

        state.modalCallback = function(realValue) {

            state.calib[prop].real = realValue;
            updateCalibDisplay();
            drawOverlay();

            state.calibStep++;

    function pickColorAndExtract(px, py) {
        var ctx = dom.imageCanvas.getContext('2d');
        var pixel = ctx.getImageData(px, py, 1, 1).data;
        var r = pixel[0], g = pixel[1], b = pixel[2];

        if ((r > 250 && g > 250 && b > 250) || (r < 5 && g < 5 && b < 5)) {
            showToast('采样点颜色接近纯白或纯黑（可能为背景），请点击曲线上的有色区域', 'error');
            return;
        }

        state.targetColor = { r: r, g: g, b: b };
        dom.colorPreview.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
        dom.colorText.textContent = 'RGB(' + r + ', ' + g + ', ' + b + ')';

        runColorExtraction();
    }

    function runColorExtraction() {
        if (!state.targetColor) return;

        var tolerance = parseInt(dom.toleranceSlider.value);
        var ctx = dom.imageCanvas.getContext('2d');
        var imgData = ctx.getImageData(0, 0, state.canvasW, state.canvasH);
        var data = imgData.data;
        var target = state.targetColor;

        var matchedPixels = [];
        for (var i = 0; i < data.length; i += 4) {
            var r = data[i], g = data[i + 1], b = data[i + 2];
            var dist = colorDistance(r, g, b, target.r, target.g, target.b);
            if (dist <= tolerance) {
                var idx = i / 4;
                matchedPixels.push({ px: idx % state.canvasW, py: Math.floor(idx / state.canvasW) });
            }
        }

        state.semiAutoPixels = matchedPixels;
        dom.semiAutoCount.textContent = '检测到 ' + matchedPixels.length + ' 个像素';
        if (matchedPixels.length > 100000) {
            dom.semiAutoCount.textContent += ' ⚠️ 像素过多，建议提高容差精度';
        } else if (matchedPixels.length === 0) {
            dom.semiAutoCount.textContent += ' — 请降低容差或重新选择颜色';
        }
        dom.btnConfirmSemiAuto.disabled = (matchedPixels.length === 0);
        drawOverlay();
        refreshUI();

        if (matchedPixels.length > 0) {
            dom.canvasContainer.classList.remove('flash');
            void dom.canvasContainer.offsetWidth;
            dom.canvasContainer.classList.add('flash');
        }
    }

    var toleranceDebounce = null;
    dom.toleranceSlider.addEventListener('input', function() {

        var y1 = Math.min(state.boxSelect.startY, state.boxSelect.endY);
        var x2 = Math.max(state.boxSelect.startX, state.boxSelect.endX);
        var y2 = Math.max(state.boxSelect.startY, state.boxSelect.endY);

        if (Math.abs(x2 - x1) < 3 && Math.abs(y2 - y1) < 3) return;

        deletePixelsInRect(x1, y1, x2, y2);

    // ==================== 手动取点放大镜 ====================

    function updateMagnifier(e) {
        var coords = getCanvasCoords(e);
        var px = coords.px, py = coords.py;
        if (px < 0 || py < 0 || px > state.canvasW || py > state.canvasH) {
            dom.magnifierCanvas.style.display = 'none';
            return;
        }

        var mag = dom.magnifierCanvas;
        var magSize = 140;
        var zoom = 4;
        var srcSize = magSize / zoom;

        var srcX = Math.round(px - srcSize / 2);
        var srcY = Math.round(py - srcSize / 2);

        var magX = px + 28;
        var magY = py + 28;
        if (magX + magSize > state.canvasW) magX = px - magSize - 28;
        if (magY + magSize > state.canvasH) magY = py - magSize - 28;
        if (magX < 0) magX = 8;
        if (magY < 0) magY = 8;

        mag.style.display = 'block';
        mag.style.left = magX + 'px';
        mag.style.top  = magY + 'px';

        var magCtx = mag.getContext('2d');
        magCtx.clearRect(0, 0, magSize, magSize);

        magCtx.save();
        magCtx.beginPath();
        magCtx.arc(magSize / 2, magSize / 2, magSize / 2 - 2, 0, Math.PI * 2);
        magCtx.clip();

        magCtx.imageSmoothingEnabled = false;
        magCtx.drawImage(
            dom.imageCanvas,
            Math.max(0, srcX), Math.max(0, srcY),
            srcSize, srcSize,
            0, 0, magSize, magSize
        );
        magCtx.restore();

        var cx = magSize / 2, cy = magSize / 2;
        magCtx.strokeStyle = '#3fb950';
        magCtx.lineWidth = 1.5;
        magCtx.beginPath();
        magCtx.moveTo(cx - 8, cy); magCtx.lineTo(cx + 8, cy);
        magCtx.moveTo(cx, cy - 8); magCtx.lineTo(cx, cy + 8);
        magCtx.stroke();
        magCtx.beginPath();
        magCtx.arc(cx, cy, 2, 0, Math.PI * 2);
        magCtx.fillStyle = '#f85149';
        magCtx.fill();
    }

    dom.btnBoxDelete.addEventListener('click', function() {

    // ==================== 数据处理与插值 ====================

    function processAndUpdateData() {
        var allPoints = getAllRealPoints();
        if (allPoints.length === 0) {
            state.processedData = [];
            updateDataDisplay();
            return;
        }

        var targetCount = parseInt(dom.resampleInput.value) || 500;

        var sorted = allPoints.slice().sort(function(a, b) { return a.x - b.x; });

        var xMin = sorted[0].x;
        var xMax = sorted[sorted.length - 1].x;
        var xRange = xMax - xMin || 1;
        var binThreshold = xRange * 0.0001;

        var merged = [];
        var currentBin = { xSum: sorted[0].x, ySum: sorted[0].y, count: 1, xBase: sorted[0].x };

        for (var i = 1; i < sorted.length; i++) {
            if (Math.abs(sorted[i].x - currentBin.xBase) < binThreshold) {
                currentBin.xSum += sorted[i].x;
                currentBin.ySum += sorted[i].y;
                currentBin.count++;
            } else {
                merged.push({
                    x: currentBin.xSum / currentBin.count,
                    y: currentBin.ySum / currentBin.count,
                });
                currentBin = { xSum: sorted[i].x, ySum: sorted[i].y, count: 1, xBase: sorted[i].x };
            }
        }
        merged.push({
            x: currentBin.xSum / currentBin.count,
            y: currentBin.ySum / currentBin.count,
        });

        var result = [];
        if (merged.length === 1) {
            for (var i = 0; i < targetCount; i++) {
                result.push({ x: merged[0].x, y: merged[0].y });
            }
        } else if (merged.length >= targetCount) {
            result.push.apply(result, merged.slice(0, targetCount));
        } else {
            var step = (merged[merged.length - 1].x - merged[0].x) / (targetCount - 1);
            for (var i = 0; i < targetCount; i++) {
                var targetX = merged[0].x + i * step;
                var left = 0, right = merged.length - 1;
                while (right - left > 1) {
                    var mid = Math.floor((left + right) / 2);
                    if (merged[mid].x <= targetX) left = mid;
                    else right = mid;
                }
                if (merged[right].x - merged[left].x < 1e-12) {
                    result.push({ x: targetX, y: merged[left].y });
                } else {
                    var t = (targetX - merged[left].x) / (merged[right].x - merged[left].x);
                    var y = merged[left].y + t * (merged[right].y - merged[left].y);
                    result.push({ x: targetX, y: y });
                }
            }
        }

        state.processedData = result;
        updateDataDisplay();
    }

    function updateDataDisplay() {
        var rawCount = getAllRealPoints().length;
        var processedCount = state.processedData.length;
        dom.dataStats.textContent =
            '当前原始数据: ' + rawCount + ' 组 | 处理后: ' + processedCount + ' 组';

        if (processedCount > 0) {
            dom.tableWrap.style.display = 'block';
            var previewCount = Math.min(processedCount, 10);
            var html = '';
            for (var i = 0; i < previewCount; i++) {
                var pt = state.processedData[i];
                html += '<tr><td>' + (i + 1) + '</td><td>' + pt.x.toFixed(6) + '</td><td>' + pt.y.toFixed(6) + '</td></tr>';
            }
            dom.tableBody.innerHTML = html;
            dom.tableHint.textContent = processedCount > 10 ?
                '（仅显示前10行，共 ' + processedCount + ' 行）' : '';
        } else {
            dom.tableWrap.style.display = 'none';
            dom.tableBody.innerHTML = '';
            dom.tableHint.textContent = '';
        }

        refreshUI();
    }

    function resetAllData() {
        state.manualPoints = [];
        state.manualRealPoints = [];
        state.semiAutoPixels = [];
        state.semiAutoRealPoints = [];
        state.targetColor = null;
        state.processedData = [];
        dom.manualCount.textContent = '已采样 0 个点';
        dom.semiAutoCount.textContent = '检测到 0 个像素';
        dom.colorPreview.style.background = '#888';
        dom.colorText.textContent = '未采样';
        dom.btnConfirmSemiAuto.disabled = true;
        updateDataDisplay();
    }

    dom.resampleSlider.addEventListener('input', function() {
        dom.resampleVal.textContent = this.value;
        dom.resampleInput.value = this.value;
    });
    dom.resampleSlider.addEventListener('change', function() {
        dom.resampleInput.value = this.value;
        processAndUpdateData();
    });
    dom.resampleInput.addEventListener('change', function() {
        var val = parseInt(this.value);
        if (isNaN(val) || val < 10) val = 10;
        if (val > 4000) val = 4000;
        this.value = val;
        dom.resampleSlider.value = val;
        dom.resampleVal.textContent = val;
        processAndUpdateData();
    });

    // ==================== 数据导出 ====================

    dom.btnExport.addEventListener('click', function() {
        if (state.processedData.length === 0) {
            showToast('没有可导出的数据', 'error');
            return;
        }
        if (typeof XLSX === 'undefined') {
            showToast('Excel 组件加载中，请稍后再试', 'error');
            return;
        }

        var aoa = [['X', 'Y']];
        state.processedData.forEach(function(pt) {
            aoa.push([pt.x, pt.y]);
        });

        var ws = XLSX.utils.aoa_to_sheet(aoa);
        ws['!cols'] = [{ wch: 16 }, { wch: 16 }];
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'DigitizedData');

        var timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
        XLSX.writeFile(wb, 'chart-data-' + timestamp + '.xlsx');

        showToast('Excel 文件已导出！共 ' + state.processedData.length + ' 组数据', 'success');
    });

    dom.btnClearAll.addEventListener('click', function() {
        if (confirm('确定要清空所有提取的数据吗？此操作不可恢复。')) {
            resetAllData();
            drawOverlay();
            showToast('所有数据已清空');
        }
    });

    // ==================== 标定按钮 ====================

    dom.btnStartCalib.addEventListener('click', function() {
        if (!state.image) {
            showToast('请先上传图片', 'error');
            return;
        }
        resetCalibration();
        state.current = STATE.CALIBRATING;
        state.calibStep = 0;
        setStatus('标定中… (1/4)', 'status-calib');
        setCanvasHint('请点击 X轴起点 (1/4)');
        dom.overlayCanvas.className = 'interactive';
        refreshUI();
        drawOverlay();
    });

    dom.btnResetCalib.addEventListener('click', function() {
        resetCalibration();
        state.current = STATE.IMAGE_LOADED;
        setStatus('图片已加载', 'status-loaded');
        setCanvasHint('请点击"开始标定"建立坐标参考系');
        dom.overlayCanvas.className = '';
        updateCalibDisplay();
        drawOverlay();
        refreshUI();
    });

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
        if (dom.modalOverlay.classList.contains('active')) return;

        switch (e.key.toLowerCase()) {
            case 'c':
                if (!dom.btnStartCalib.disabled && state.current !== STATE.CALIBRATING) {
                    dom.btnStartCalib.click();
                }
                break;
            case 'm':
                if (!dom.btnManualMode.disabled) dom.btnManualMode.click();
                break;
            case 's':
                if (!dom.btnSemiAutoMode.disabled) dom.btnSemiAutoMode.click();
                break;
            case 'z':
                if (e.ctrlKey && !dom.btnUndoPoint.disabled) {
                    e.preventDefault();
                    dom.btnUndoPoint.click();
                }
                break;
            case 'e':
                if (!dom.btnExport.disabled && !e.ctrlKey) {
                    dom.btnExport.click();
                }
                break;
        }
    });

    // ==================== 窗口大小变化自适应 ====================
    var resizeDebounce = null;
    window.addEventListener('resize', function() {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(function() {
            if (state.image) {
                var area = dom.canvasArea;
                var maxW = area.clientWidth - 40;
                var maxH = area.clientHeight - 40;
                var scale = Math.min(maxW / state.imgNaturalW, maxH / state.imgNaturalH, 1.0);
                state.scale = scale;
                state.canvasW = Math.round(state.imgNaturalW * scale);
                state.canvasH = Math.round(state.imgNaturalH * scale);
                drawImageOnCanvas();
                drawOverlay();
            }
        }, 300);
    });

    // ==================== 初始化 ====================
    function init() {
        setStatus('待上传图片', 'status-idle');
        setCanvasHint('请先上传一张科研图表');
        refreshUI();
        updateDataDisplay();

        var testCanvas = dom.imageCanvas;
        testCanvas.width  = 400;
        testCanvas.height = 300;
        testCanvas.style.width  = '400px';
        testCanvas.style.height = '300px';
        var testCtx = testCanvas.getContext('2d');
        testCtx.fillStyle = '#1a1a2e';
        testCtx.fillRect(0, 0, 400, 300);
        testCtx.strokeStyle = '#30363d';
        testCtx.lineWidth = 2;
        testCtx.strokeRect(1, 1, 398, 298);
        testCtx.font = '14px "Segoe UI", system-ui, sans-serif';
        testCtx.fillStyle = '#8b949e';
        testCtx.textAlign = 'center';
        testCtx.fillText('上传图片后将在此显示', 200, 150);

        dom.overlayCanvas.width  = 400;
        dom.overlayCanvas.height = 300;
        dom.overlayCanvas.style.width  = '400px';
        dom.overlayCanvas.style.height = '300px';
    }

    init();

    console.log('═══════════════════════════════════════════');
    console.log(' Chart Digitizer 初始化完成');
    console.log(' 上传方式: 点击虚线框区域 或 拖拽图片到虚线框');
    console.log(' 快捷键: C=开始标定 | M=手动取点 | S=半自动拾色 | E=导出Excel | Ctrl+Z=撤销取点');
    console.log(' Prism WebGL 背景: 鼠标移动可交互旋转');
    console.log('═══════════════════════════════════════════');

})();
</script>
</body>
</html>
